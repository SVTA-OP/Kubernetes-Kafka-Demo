# --- FASTAPI GATEWAY DEPLOYMENT & SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done",
            ]
      containers:
        - name: api
          image: enterprise-telemetry-app:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: KAFKA_BROKER_URL
              value: "kafka:9092"
            - name: JAEGER_ENDPOINT_URL
              value: "http://jaeger:4317"
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
spec:
  type: NodePort
  selector:
    app: fastapi
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30000

---
# --- BACKGROUND CONSUMER WORKER DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done",
            ]
      containers:
        - name: worker
          image: enterprise-telemetry-app:v2
          imagePullPolicy: Never
          command: ["python", "-u", "consumer.py"]
          env:
            - name: KAFKA_BROKER_URL
              value: "kafka:9092"
            - name: JAEGER_ENDPOINT_URL
              value: "http://jaeger:4317"
